<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c10">
<title>ABCC33 — AmarTech</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;}
body{
  background:#0a0c10;
  color:#e2e8f0;
  font-family:'Plus Jakarta Sans',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* ANIMATED BACKGROUND */
.bg-glow{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(30,80,200,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 90%, rgba(14,60,160,0.07) 0%, transparent 60%);
  animation:bgshift 8s ease-in-out infinite alternate;
}
@keyframes bgshift{
  from{background-position:0% 0%;}
  to{background-position:100% 100%;}
}

/* GRID OVERLAY */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size:40px 40px;
}

/* PARTICLES */
.particle{
  position:fixed;border-radius:50%;
  background:rgba(59,130,246,0.15);
  animation:float linear infinite;
  z-index:0;
}
@keyframes float{
  0%{transform:translateY(110vh) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:0.5;}
  100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
}

/* MAIN CONTAINER */
.container{
  position:relative;z-index:10;
  width:100%;max-width:400px;
  padding:24px 20px;
  display:flex;flex-direction:column;align-items:center;
}

/* LOGO ZONE */
.logo-zone{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:32px;
  animation:logoIn .8s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes logoIn{
  from{opacity:0;transform:translateY(-30px) scale(0.8);}
  to{opacity:1;transform:none;}
}

.logo-ring-wrap{
  position:relative;
  width:140px;height:140px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
}

/* Animated rings around logo */
.ring{
  position:absolute;border-radius:50%;border:1.5px solid transparent;
}
.ring-1{
  width:140px;height:140px;
  border-color:rgba(59,130,246,0.35);
  animation:spin1 12s linear infinite;
  border-top-color:rgba(59,130,246,0.8);
  border-right-color:rgba(96,165,250,0.4);
}
.ring-2{
  width:118px;height:118px;
  border-color:rgba(59,130,246,0.2);
  animation:spin2 8s linear infinite reverse;
  border-bottom-color:rgba(59,130,246,0.6);
  border-left-color:rgba(96,165,250,0.3);
}
.ring-3{
  width:96px;height:96px;
  border-color:rgba(59,130,246,0.12);
  animation:spin1 15s linear infinite;
  border-top-color:rgba(59,130,246,0.4);
}
@keyframes spin1{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes spin2{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}

.logo-img{
  width:80px;height:80px;
  object-fit:contain;
  border-radius:16px;
  position:relative;z-index:2;
  filter:drop-shadow(0 0 12px rgba(59,130,246,0.4)) drop-shadow(0 0 24px rgba(59,130,246,0.2));
  animation:logopulse 3s ease-in-out infinite;
}
@keyframes logopulse{
  0%,100%{filter:drop-shadow(0 0 12px rgba(59,130,246,0.4)) drop-shadow(0 0 24px rgba(59,130,246,0.2));}
  50%{filter:drop-shadow(0 0 20px rgba(59,130,246,0.7)) drop-shadow(0 0 40px rgba(59,130,246,0.35));}
}

.brand-name{
  font-size:28px;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#e2e8f0 0%,#60a5fa 50%,#e2e8f0 100%);
  background-clip:text;-webkit-background-clip:text;color:transparent;
  background-size:200%;
  animation:shimmer 4s ease-in-out infinite;
  margin-bottom:4px;
}
@keyframes shimmer{0%,100%{background-position:0%;}50%{background-position:100%;}}

.brand-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:.25em;color:#64748b;
  text-transform:uppercase;
}

/* CARD */
.login-card{
  background:rgba(15,18,24,0.8);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:28px 24px;
  width:100%;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 24px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(59,130,246,0.05);
  animation:cardIn .6s ease .2s both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:none;}
}

.login-title{
  font-size:16px;font-weight:700;margin-bottom:4px;text-align:center;
}
.login-sub{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:#64748b;
  letter-spacing:.12em;text-align:center;margin-bottom:24px;
}

.field{margin-bottom:16px;}
.field label{
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;
  color:#94a3b8;display:block;margin-bottom:7px;
}
.field-wrap{
  position:relative;display:flex;align-items:center;
}
.field-icon{
  position:absolute;left:14px;font-size:16px;z-index:2;
}
.field input{
  width:100%;background:rgba(21,26,34,0.8);
  border:1px solid rgba(255,255,255,0.08);border-radius:12px;
  padding:13px 14px 13px 44px;
  color:#e2e8f0;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;
  outline:none;transition:all .2s;
  -webkit-text-security:none;
}
.field input:focus{
  border-color:rgba(59,130,246,0.5);
  background:rgba(21,26,34,1);
  box-shadow:0 0 0 3px rgba(59,130,246,0.1);
}
.field input.error{
  border-color:rgba(239,68,68,0.5);
  box-shadow:0 0 0 3px rgba(239,68,68,0.08);
  animation:shake .3s ease;
}
@keyframes shake{0%,100%{transform:none;}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

.toggle-pw{
  position:absolute;right:13px;background:none;border:none;
  color:#64748b;cursor:pointer;font-size:16px;padding:4px;
  transition:color .2s;
}
.toggle-pw:hover{color:#94a3b8;}

.login-btn{
  width:100%;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  border:none;border-radius:12px;
  padding:15px;
  color:white;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:.02em;
  cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;
  margin-top:8px;
}
.login-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);
  opacity:0;transition:opacity .2s;
}
.login-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(59,130,246,0.4);
}
.login-btn:hover::after{opacity:1;}
.login-btn:active{transform:translateY(0);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

.login-btn .btn-text{display:flex;align-items:center;justify-content:center;gap:8px;}
.login-spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;border-radius:50%;
  animation:spin 0.6s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg);}}

.error-msg{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
  border-radius:10px;padding:11px 14px;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:#ef4444;
  text-align:center;margin-top:12px;
  display:none;animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.footer-note{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  color:#334155;text-align:center;margin-top:24px;
  letter-spacing:.08em;
  animation:cardIn .6s ease .4s both;
}

/* LOADING OVERLAY */
.loading-overlay{
  position:fixed;inset:0;z-index:100;
  background:#0a0c10;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.loading-overlay.on{display:flex;}
.load-logo{width:70px;height:70px;object-fit:contain;animation:logopulse 1s ease-in-out infinite;}
.load-text{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3b82f6;letter-spacing:.2em;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.load-bar{width:200px;height:2px;background:rgba(59,130,246,.15);border-radius:2px;overflow:hidden;}
.load-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:2px;animation:loading 1.5s ease-in-out forwards;}
@keyframes loading{from{width:0;}to{width:100%;}}
</style>
</head>

    <div class="brand-name">AmarTech</div>
    <div class="brand-sub">ABCC33 · Assistant IA Plomberie</div>

  <!-- LOGIN CARD -->
  <div class="login-card">
    <div class="login-title">Connexion sécurisée</div>
    <div class="login-sub">// ACCÈS RÉSERVÉ · ABCC33</div>

    <div class="field">
      <label>IDENTIFIANT</label>
      <div class="field-wrap">
        <span class="field-icon">👤</span>
        <input type="text" id="loginUser" placeholder="Identifiant" autocomplete="username"
          onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
      </div>
    </div>

    <div class="field">
      <label>MOT DE PASSE</label>
      <div class="field-wrap">
        <span class="field-icon">🔒</span>
        <input type="password" id="loginPass" placeholder="Mot de passe" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button class="toggle-pw" onclick="togglePw()" id="pwToggle">👁️</button>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <div class="btn-text">
        <div class="login-spinner" id="loginSpinner"></div>
        <span id="loginBtnText">🔑 &nbsp;SE CONNECTER</span>
      </div>
    </button>

    <div class="error-msg" id="errorMsg">
      ✗ &nbsp;Identifiant ou mot de passe incorrect
    </div>
  </div>

  <div class="footer-note">
    ABCC33 · SIRET 498 201 292 00030 · Martignas-sur-Jalle (33)<br>
    Travaux d'installation d'équipements thermiques et de climatisation
  </div>
</div>

<script>
const CREDS = { user: 'ABCC33', pass: '09031977' };

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('loginSpinner');
  const btnTxt = document.getElementById('loginBtnText');
  const errMsg = document.getElementById('errorMsg');
  const userIn = document.getElementById('loginUser');
  const passIn = document.getElementById('loginPass');

  // Clear previous errors
  errMsg.style.display = 'none';
  userIn.classList.remove('error');
  passIn.classList.remove('error');

  if (!user || !pass) {
    errMsg.textContent = '⚠️  Remplis les deux champs';
    errMsg.style.display = 'block';
    return;
  }

  // Show loading
  btn.disabled = true;
  spinner.style.display = 'block';
  btnTxt.textContent = 'Vérification...';

  setTimeout(() => {
    if (user === CREDS.user && pass === CREDS.pass) {
      // SUCCESS — show loading overlay then redirect
      btnTxt.textContent = '✓  Accès autorisé !';
      spinner.style.display = 'none';
      btn.style.background = 'linear-gradient(135deg,#16a34a,#22c55e)';

      sessionStorage.setItem('abcc33_auth', '1');

      setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('on');
        setTimeout(() => {
          window.location.href = 'app.html';
        }, 1800);
      }, 500);
    } else {
      // FAIL
      btn.disabled = false;
      spinner.style.display = 'none';
      btnTxt.textContent = '🔑  SE CONNECTER';
      errMsg.style.display = 'block';
      userIn.classList.add('error');
      passIn.classList.add('error');
      passIn.value = '';
      // Shake the card
      document.querySelector('.login-card').style.animation = 'none';
      setTimeout(() => document.querySelector('.login-card').style.animation = '', 10);
    }
  }, 900);
}

function togglePw() {
  const inp = document.getElementById('loginPass');
  const btn = document.getElementById('pwToggle');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    btn.textContent = '👁️';
  }
}

// Auto-focus
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginUser').focus();
});
</script>
